<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login - API Docs</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap');

    :root {
      --bg: #f3f5ee;
      --card: #fffef9;
      --text: #1a231d;
      --muted: #5f6a63;
      --line: #d7ddd2;
      --accent: #165a47;
      --error-bg: #fde9eb;
      --error-text: #a6202f;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 16px;
      font-family: 'Space Grotesk', sans-serif;
      color: var(--text);
      background:
        radial-gradient(800px 380px at 100% 0%, #d8f0c5 0%, transparent 60%),
        radial-gradient(700px 420px at 0% 100%, #c9ead8 0%, transparent 60%),
        var(--bg);
    }

    .card {
      width: 100%;
      max-width: 430px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--card);
      padding: 24px;
      box-shadow: 0 16px 32px rgba(21, 34, 24, 0.12);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 29px;
    }

    p {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 14px;
    }

    .field {
      display: grid;
      gap: 6px;
      margin-bottom: 12px;
    }

    label {
      font-size: 13px;
      font-weight: 600;
    }

    input {
      height: 42px;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 0 12px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(22, 90, 71, 0.18);
    }

    button {
      width: 100%;
      height: 42px;
      border: 0;
      border-radius: 10px;
      background: linear-gradient(120deg, #184f40 0%, #226e58 100%);
      color: #fff;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .error {
      margin-top: 12px;
      padding: 9px 10px;
      border-radius: 9px;
      background: var(--error-bg);
      color: var(--error-text);
      font-size: 13px;
      display: none;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>API Docs Access</h1>
    <p>Đăng nhập tài khoản admin để mở trang tài liệu API.</p>

    <form id="loginForm" autocomplete="off">
      <div class="field">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" autocomplete="off" required />
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="new-password" required />
      </div>

      <button id="submitBtn" type="submit">Login As Admin</button>
    </form>

    <div id="error" class="error"></div>
  </main>

  <script>
    const form = document.getElementById('loginForm');
    const submitBtn = document.getElementById('submitBtn');
    const errorBox = document.getElementById('error');
    const DOCS_TOKEN_KEY = 'api_docs_bearer_token';

    form.reset();

    const showError = (message) => {
      errorBox.textContent = message;
      errorBox.style.display = 'block';
    };

    const clearError = () => {
      errorBox.textContent = '';
      errorBox.style.display = 'none';
    };

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      clearError();

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (!username || !password) {
        showError('Vui lòng nhập username và password');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Logging in...';

      try {
        const res = await fetch('/api-docs/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json().catch(() => ({}));

        if (!res.ok || !data.success) {
          throw new Error(data.message || 'Đăng nhập thất bại');
        }

        if (data.token) {
          sessionStorage.setItem(DOCS_TOKEN_KEY, data.token);
        }

        window.location.href = data.redirect || '/api-docs/ui';
      } catch (error) {
        showError(error.message || 'Không thể đăng nhập');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Login As Admin';
      }
    });
  </script>
</body>
</html>
